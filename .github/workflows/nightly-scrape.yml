name: Nightly arXiv Scrape

on:
  schedule:
    - cron: "0 6 * * *" # 6 AM UTC daily
  workflow_dispatch:
    inputs:
      backfill_months:
        description: "Number of months to backfill (0 = last 24h only)"
        required: false
        default: "0"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: |
          if [ "${{ github.event.inputs.backfill_months }}" != "" ] && [ "${{ github.event.inputs.backfill_months }}" != "0" ]; then
            python scrape.py --backfill-months ${{ github.event.inputs.backfill_months }}
          else
            python scrape.py --days 2
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No new data to commit"
          else
            git commit -m "data: update researchers $(date -u +%Y-%m-%d)"
            git push
          fi
